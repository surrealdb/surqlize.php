name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  COMPOSER_ROOT_VERSION: dev-main

defaults:
  run:
    working-directory: surqlize.php

jobs:
  quality:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php:
          - '8.4'

    steps:
      - name: Checkout Surqlize
        uses: actions/checkout@v4
        with:
          path: surqlize.php

      - name: Checkout SurrealDB PHP SDK
        uses: actions/checkout@v4
        with:
          repository: surrealdb-dev/surrealdb.php
          ref: main
          path: surrealdb.php-refined

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Validate Composer metadata
        run: composer validate --no-check-publish

      - name: Install dependencies
        uses: ramsey/composer-install@v3
        with:
          working-directory: surqlize.php
          composer-options: --no-interaction --no-progress --prefer-dist

      - name: Audit dependencies
        run: composer audit --locked

      - name: Run static analysis
        run: composer run analyse

      - name: Run unit tests
        run: |
          mkdir -p build/logs
          composer run test -- --log-junit build/logs/phpunit.xml

      - name: Upload PHPUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phpunit-report-php-${{ matrix.php }}
          path: surqlize.php/build/logs/phpunit.xml
          if-no-files-found: ignore
